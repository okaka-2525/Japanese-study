            <button class="btn-red" onclick="judge(false)">間違えた(赤)</button>

    let currentCategory = [];
    let currentQuestion = null;
    let totalCount = 0;
    let blueCount = 0;
    let redCount = 0;

    function startApp() {
        const catKey = document.getElementById("category").value;
        currentCategory = data[catKey];
        
        totalCount = 0;
        blueCount = 0;
        redCount = 0;
        updateStats();

        document.getElementById("screen-home").classList.add("hidden");
        document.getElementById("screen-result").classList.add("hidden");
        document.getElementById("screen-quiz").classList.remove("hidden");

        nextQuestion();
    }

    function nextQuestion() {
        const randomIndex = Math.floor(Math.random() * currentCategory.length);
        currentQuestion = currentCategory[randomIndex];
        totalCount++;
        
        document.getElementById("question-text").innerText = currentQuestion.q;
        document.getElementById("answer-text").innerText = "";
        
        document.getElementById("btn-show-answer").classList.remove("hidden");
        document.getElementById("judge-buttons").classList.add("hidden");
        updateStats();
    }

    function showAnswer() {
        let answerStr = "";
        if (currentQuestion.onyomi !== undefined || currentQuestion.kunyomi !== undefined) {
            const on = currentQuestion.onyomi || "なし";
            const kun = currentQuestion.kunyomi || "なし";
            answerStr = `音読み(ひら): ${on}\n訓読み(カタ): ${kun}`;
        } else {
            answerStr = `答え: ${currentQuestion.a}`;
        }
        
        document.getElementById("answer-text").innerText = answerStr;
        document.getElementById("btn-show-answer").classList.add("hidden");
        document.getElementById("judge-buttons").classList.remove("hidden");
    }

    function judge(isCorrect) {
        if (isCorrect) {
            blueCount++;
        } else {
            redCount++;
        }
        
        if (redCount >= 10) {
            endApp();
        } else {
            nextQuestion();
        }
    }

    function updateStats() {
        document.getElementById("total-count").innerText = totalCount;
        document.getElementById("blue-count").innerText = blueCount;
        document.getElementById("red-count").innerText = redCount;
    }

    function endApp() {
        document.getElementById("screen-quiz").classList.add("hidden");
        document.getElementById("screen-result").classList.remove("hidden");
        document.getElementById("final-score").innerText = blueCount;
    }

    function goHome() {
        document.getElementById("screen-result").classList.add("hidden");
        document.getElementById("screen-home").classList.remove("hidden");
    }
